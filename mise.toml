[tools]
git = "latest"
uv = "latest"



[tasks.ruff-fix]
run = "uv run ruff check . --fix --unsafe-fixes && ruff format ."

[tasks.publish]
description = "Stage changes, bump version, push tags. Mirrors the pixi publish task."
depends = ["ruff-fix"]
usage = '''
arg "[part]" default="patch" help="Version part to bump (patch|minor|major)"
flag "-m --message <message>" default="incrementing version to {new_version}" help="Commit message template forwarded to bump-my-version"
'''
run = '''
git add .
if ! git diff --staged --quiet; then
  git commit -m "pre-release: staging changes"
fi
uv run bump-my-version bump "{{ usage.part }}" --message "{{ usage.message }}"
git push origin HEAD --tags
'''
