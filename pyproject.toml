[build-system]
requires = ["uv_build>=0.9.6,<0.10.0"]
build-backend = "uv_build"

[project]
name = "lfp-build"
version = "0.0.1+g19a292c"
description = "Local build utilities"
requires-python = ">=3.11,<3.14"
dependencies = [
    # Build and workspace command orchestration backend.
    "uv>=0.9.9",
    # CLI framework used for command parsing and help output.
    "cyclopts",
    # Logging facade used across all modules.
    "lfp-logging @ git+https://github.com/regbo/lfp-logging-py.git",
    # Load .env files for runtime config defaults.
    "python-dotenv",
    # Auto-load lfp_build._config at interpreter startup.
    "sitecustomize-entrypoints",
    # Parse and write pyproject.toml with formatting preservation.
    "tomlkit",
    # Deep merge for pyproject tables.
    "mergedeep",
    # Lint and format engine invoked by sync.
    "ruff",
    # Type inference engine invoked by sync before Ruff.
    "basedpyright",
    # CST transformer used to apply inferred return types.
    "libcst",
]

[project.scripts]
lfp-build = "lfp_build.cli:main"

[project.entry-points.sitecustomize]
lfp-build-config = "lfp_build._config:load"

[dependency-groups]
dev = ["pytest"]


[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "ANN"]
ignore = ["ANN401"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["ANN001", "ANN002", "ANN003", "ANN202", "ANN201"]